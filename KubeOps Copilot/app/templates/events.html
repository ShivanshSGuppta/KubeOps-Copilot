{% extends "base.html" %}
{% block content %}
<div class="card">
  <h2 class="h2">Events • {{ namespace }}</h2>
  <div class="mt-3 space-y-2">
    {% for e in events %}
      <div class="row">
        <div>
          <div class="font-medium">{{ e.reason }} <span class="text-xs text-slate-400">({{ e.type }})</span></div>
          <div class="text-xs text-slate-300">{{ e.message }}</div>
          <div class="text-xs text-slate-400">object: {{ e.involvedObject }} • time: {{ e.time }}</div>
        </div>
      </div>
    {% endfor %}
    {% if events|length == 0 %}
      <div class="text-sm text-slate-300">No events found.</div>
    {% endif %}
  </div>
</div>
{% endblock %}

{% extends "base.html" %}
{% block content %}
<div class="card">
  <h2 class="h2">Namespaces</h2>
  <div class="mt-3 grid md:grid-cols-2 gap-2">
    {% for ns in namespaces %}
      <div class="row">
        <div class="font-medium">{{ ns }}</div>
        <div class="ml-auto flex gap-3">
          <a class="link" href="/namespaces/{{ ns }}/pods">pods</a>
          <a class="link" href="/namespaces/{{ ns }}/events">events</a>
        </div>
      </div>
    {% endfor %}
  </div>
</div>
{% endblock %}
